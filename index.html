<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900">
    <main class="grid min-h-screen place-items-center px-6 py-24 sm:py-32 lg:px-8">
        <div class="flex flex-col items-center gap-4 text-center">
            <p class="text-base font-semibold text-indigo-400">Digital Clock</p>
            <div class="mt-4 text-5xl font-semibold tracking-tight text-balance text-white sm:text-7xl">
                <span id="hrs">00</span>
                <span>:</span>
                <span id="min">00</span>
                <span>:</span>
                <span id="sec">00</span>
            </div>
            <div class="mt-10 text-white/50 p-4">
                <button id="toggleButton" class="px-3.5 py-2.5 text-[8px]">Enter Fullscreen & Stay Awake</button>
            </div>
        </div>
    </main>

    <script>
        let hrs = document.getElementById("hrs");
        let min = document.getElementById("min");
        let sec = document.getElementById("sec");

        setInterval(()=>{
            let currentTime = new Date();

            hrs.innerHTML = (currentTime.getHours()<10?"0":"") + currentTime.getHours();
            min.innerHTML = (currentTime.getMinutes()<10?"0":"") + currentTime.getMinutes();
            sec.innerHTML = (currentTime.getSeconds()<10?"0":"") + currentTime.getSeconds();
        },1000)

        let wakeLock = null;
        const button = document.getElementById('toggleButton');

        // Request wake lock
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
                wakeLock.addEventListener('release', () => {
                    console.log('Wake Lock released');
                });
                console.log('Wake Lock active');
                }
            } catch (err) {
                console.error(`Wake Lock error: ${err.name}, ${err.message}`);
            }
        }

        // Release wake lock
        async function releaseWakeLock() {
            if (wakeLock) {
                await wakeLock.release();
                wakeLock = null;
                console.log('Wake Lock manually released');
            }
        }

        // Enter fullscreen
        function enterFullScreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) return elem.requestFullscreen();
            if (elem.webkitRequestFullscreen) return elem.webkitRequestFullscreen(); // Safari
            if (elem.msRequestFullscreen) return elem.msRequestFullscreen(); // IE11
        }

        // Exit fullscreen
        function exitFullScreen() {
            if (document.exitFullscreen) return document.exitFullscreen();
            if (document.webkitExitFullscreen) return document.webkitExitFullscreen(); // Safari
            if (document.msExitFullscreen) return document.msExitFullscreen(); // IE11
        }

        // Check if we're in fullscreen
        function isFullScreen() {
            return document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement;
        }

        // Button toggle logic
        button.addEventListener('click', async () => {
            if (isFullScreen()) {
                await exitFullScreen();
                await releaseWakeLock();
                button.textContent = 'Enter Fullscreen & Stay Awake';
            } else {
                await enterFullScreen();
                await requestWakeLock();
                button.textContent = 'Exit Fullscreen & Release Wake Lock';
            }
        });

        // Reacquire wake lock if needed
        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                await requestWakeLock();
            }
        });
    </script>
</body>
</html>
